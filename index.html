<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGreen Energy — Desconto na conta de luz · Minas Gerais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-light: #17b87f; --green-dim: #0F6E56;
  --surface: #f4faf7; --surface2: #e8f5ef;
  --border: rgba(29,158,117,0.18); --border2: rgba(29,158,117,0.35);
  --text: #0d1f17; --text2: #3a6650; --text3: #7aaa92;
  --r: 16px; --rs: 12px;
}
html, body { min-height: 100vh; background: #fff; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(29,158,117,0.05) 0%, transparent 60%);
}
.wrap { max-width: 540px; margin: 0 auto; padding: 2rem 1.1rem 3.5rem; }

/* HEADER */
.hd { text-align: center; padding: 1.5rem 1rem 1.75rem; border-bottom: 1px solid var(--border); margin-bottom: 2.25rem; }
.logo { max-width: 155px; height: auto; display: block; margin: 0 auto .9rem; }
.hd-pills { display: flex; align-items: center; justify-content: center; gap: .5rem; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; background: rgba(29,158,117,0.08); border: 1px solid var(--border2); color: var(--green-dim); font-size: 14px; font-weight: 700; padding: 6px 14px; border-radius: 99px; }
.mg-badge { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(29,158,117,0.06); border: 1px solid var(--border); border-radius: var(--rs); padding: .8rem 1rem; margin-top: 1rem; font-size: 15px; font-weight: 700; color: var(--text2); }
.mg-badge span { color: var(--green-dim); }

/* PERGUNTA */
.qtitle {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: .8rem;
  text-align: center;
}
.qtitle em { font-style: normal; color: var(--green); }
.qsub {
  font-size: 18px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 2.25rem;
  font-weight: 400;
  text-align: center;
}

/* OPTIONS */
.opts { display: flex; flex-direction: column; gap: .8rem; }
.ob {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 20px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  text-align: left;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .15s, background .15s, transform .1s;
  box-shadow: 0 1px 5px rgba(0,0,0,0.06);
  min-height: 80px;
}
.ob:active { transform: scale(0.985); }
.ob.sel {
  border-color: var(--green);
  background: var(--surface2);
  box-shadow: 0 2px 16px rgba(29,158,117,0.15);
}
.oic {
  width: 54px; height: 54px;
  border-radius: 13px;
  background: rgba(29,158,117,0.08);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 28px;
}
.ob.sel .oic { background: rgba(29,158,117,0.15); border-color: var(--border2); }
.otx { flex: 1; min-width: 0; }
.olb { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.25; }
.ods { font-size: 15px; color: var(--text3); margin-top: 4px; font-weight: 400; }
.chk {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid #c5d9ce;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
}
.ob.sel .chk { background: var(--green); border-color: var(--green); }
.chk-svg { width: 14px; height: 14px; display: none; }
.ob.sel .chk-svg { display: block; }

/* LOADING SCREEN */
.loading-screen {
  display: none;
  text-align: center;
  padding: 3rem 1rem;
  animation: rise .4s ease;
}
.loading-screen.active { display: block; }
@keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.loading-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 36px;
  box-shadow: 0 0 0 10px rgba(29,158,117,0.08);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 10px rgba(29,158,117,0.08); }
  50%       { box-shadow: 0 0 0 18px rgba(29,158,117,0.04); }
}

.loading-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 28px; font-weight: 800;
  color: var(--text); margin-bottom: .6rem; line-height: 1.2;
}
.loading-sub { font-size: 17px; color: var(--text2); font-weight: 400; margin-bottom: 2rem; line-height: 1.55; }

.progress-bar-wrap { background: #dceee5; border-radius: 99px; height: 10px; overflow: hidden; margin: 0 auto 1rem; max-width: 320px; }
.progress-bar-fill {
  height: 10px;
  background: linear-gradient(90deg, var(--green), var(--green-light));
  border-radius: 99px;
  width: 0%;
  transition: width .3s ease;
}
.progress-pct { font-size: 15px; color: var(--text3); font-weight: 700; }

.eco-reveal {
  display: none;
  background: linear-gradient(135deg, rgba(29,158,117,0.08), rgba(29,158,117,0.03));
  border: 2px solid var(--border2);
  border-radius: var(--r);
  padding: 1.75rem;
  text-align: center;
  margin: 1.5rem 0;
  animation: rise .5s ease;
}
.eco-reveal.show { display: block; }
.eco-lbl { font-size: 14px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
.eco-val {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 60px; font-weight: 800;
  color: var(--green); line-height: 1.05; margin-bottom: .25rem;
}
.eco-desc { font-size: 17px; color: var(--text2); }

.wbtn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 22px;
  background: linear-gradient(135deg, #1aaf58, #25D366);
  color: #fff; border: none; border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 20px; font-weight: 700;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 6px 28px rgba(37,211,102,0.35);
  transition: transform .18s;
  margin-top: .5rem;
  animation: rise .5s ease;
}
.wbtn:active { transform: scale(0.98); }
.fnote { text-align: center; font-size: 14px; color: var(--text3); margin-top: 1rem; line-height: 1.65; }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hd">
    <img src="https://raw.githubusercontent.com/iagoaugustocrv21-cell/IGREEN-LOGO/main/logobrand.png" alt="iGreen Energy" class="logo">
    <div class="hd-pills">
      <span class="pill">✓ 100% gratuito</span>
      <span class="pill">✓ Sem instalação</span>
      <span class="pill">✓ Sem fidelidade</span>
    </div>
    <div class="mg-badge">🌿 Exclusivo para <span>Minas Gerais</span> — via CEMIG</div>
  </div>

  <!-- PERGUNTA -->
  <div id="quiz-block">
    <p class="qtitle">Quanto você paga de <em>conta de luz</em> por mês?</p>
    <p class="qsub">Toque na opção abaixo e veja seu desconto na hora.</p>
    <div class="opts">
      <button class="ob" onclick="pick(this)">
        <div class="oic">💡</div>
        <div class="otx"><div class="olb">R$ 30 – R$ 80</div><div class="ods">Ainda tem desconto todo mês</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
      <button class="ob" onclick="pick(this)">
        <div class="oic">💡</div>
        <div class="otx"><div class="olb">R$ 80 – R$ 150</div><div class="ods">Desconto chega direto na sua fatura</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
      <button class="ob" onclick="pick(this)">
        <div class="oic">💡</div>
        <div class="otx"><div class="olb">R$ 150 – R$ 300</div><div class="ods">Perfil ideal — economia expressiva</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
      <button class="ob" onclick="pick(this)">
        <div class="oic">⚡</div>
        <div class="otx"><div class="olb">R$ 300 – R$ 500</div><div class="ods">Economia de uma cesta básica por mês</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
      <button class="ob" onclick="pick(this)">
        <div class="oic">⚡</div>
        <div class="otx"><div class="olb">R$ 500 – R$ 800</div><div class="ods">Grande potencial de economia</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
      <button class="ob" onclick="pick(this)">
        <div class="oic">🔥</div>
        <div class="otx"><div class="olb">Acima de R$ 800</div><div class="ods">Potencial máximo de desconto</div></div>
        <div class="chk"><svg class="chk-svg" viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"><polyline points="1 5 4.5 8.5 11 1.5"/></svg></div>
      </button>
    </div>
  </div>

  <!-- LOADING + RESULTADO -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-avatar">☀️</div>
    <p class="loading-title" id="loading-title">Calculando seu desconto...</p>
    <p class="loading-sub" id="loading-sub">Verificando sua elegibilidade na CEMIG</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="pbar"></div>
    </div>
    <p class="progress-pct" id="pbar-pct">0%</p>
  </div>

</div>
<script>
var WA_LINK = 'https://wa.me/5511988278401?text=Quero%20desconto%20na%20conta%20de%20luz';

function pick(btn) {
  document.querySelectorAll('.ob').forEach(function(b) { b.classList.remove('sel'); });
  btn.classList.add('sel');
  setTimeout(function() {
    document.getElementById('quiz-block').style.display = 'none';
    document.getElementById('loading-screen').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    runLoading();
  }, 350);
}

function runLoading() {
  var steps = [
    { pct: 20,  title: 'Calculando seu desconto...',       sub: 'Verificando sua elegibilidade na CEMIG' },
    { pct: 45,  title: 'Consultando fazendas solares...',  sub: 'Encontrando a melhor opção para você' },
    { pct: 70,  title: 'Quase pronto...',                  sub: 'Confirmando o percentual de desconto' },
    { pct: 90,  title: 'Finalizando simulação...',         sub: 'Só mais um segundo!' },
    { pct: 100, title: 'Pronto! 🎉',                       sub: 'Seu desconto foi calculado com sucesso' },
  ];

  var i = 0;
  var bar   = document.getElementById('pbar');
  var pct   = document.getElementById('pbar-pct');
  var title = document.getElementById('loading-title');
  var sub   = document.getElementById('loading-sub');

  function nextStep() {
    if (i >= steps.length) {
      window.location.href = WA_LINK;
      return;
    }

    var s = steps[i];
    bar.style.width   = s.pct + '%';
    pct.textContent   = s.pct + '%';
    title.textContent = s.title;
    sub.textContent   = s.sub;
    i++;
    setTimeout(nextStep, 500);
  }

  nextStep();
}
</script>
</body>
</html>
